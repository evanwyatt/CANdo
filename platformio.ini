; CANable 2.0 Pro — CAN-to-USB CDC bridge with COBS framing
; MCU: STM32G0B1CBT6

[env:canable2]
platform          = ststm32
board             = genericSTM32G431CB
framework         = arduino

build_flags =
    -DUSBCON
    -DUSBD_USE_CDC
    -DHAL_FDCAN_MODULE_ENABLED
    -DSERIAL_USB
    ; USB identity — overrides the STM32duino defaults (0x0483 / 0x5740).
    ; Must match CANDO_VID / CANDO_PID constants in app/main.ts.
    ; Register a PID at https://pid.codes if distributing publicly.
    -DUSBD_VID=0x1209
    -DUSBD_PID=0xCAD0

; DFU upload via built-in USB bootloader (hold BOOT0 button while plugging in)
upload_protocol   = dfu
upload_flags      = --dfuse-address=0x08000000:leave

monitor_speed     = 115200
; Windows: monitor_port = COM3
; macOS:   monitor_port = /dev/tty.usbmodem*
; Linux:   monitor_port = /dev/ttyACM0
